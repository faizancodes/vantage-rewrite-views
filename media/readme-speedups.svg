<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">VANTAGE/SafeRoute is faster than tuned PLD</title>
  <desc id="desc">Speedup ratios on controlled explicit-map Python edit workloads.</desc>
  <rect width="1100" height="430" fill="#fbfbfb"/>
  <rect x="24" y="24" width="1052" height="382" rx="0" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="48" y="62" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#71717a" text-transform="uppercase">VANTAGE / controlled fp32/sdpa</text>
  <text x="48" y="96" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#0a0a0a">VANTAGE/SafeRoute is faster than tuned PLD</text>
  <text x="48" y="122" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#52525b">Speedup ratios on controlled explicit-map Python edit workloads.</text>
  <line x1="595.9" y1="158" x2="595.9" y2="358" stroke="#e4e4e7" stroke-width="1"/>
  <text x="595.9" y="384" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a" text-anchor="middle">1x</text>
  <line x1="675.4" y1="158" x2="675.4" y2="358" stroke="#e4e4e7" stroke-width="1"/>
  <text x="675.4" y="384" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a" text-anchor="middle">1.2x</text>
  <line x1="754.9" y1="158" x2="754.9" y2="358" stroke="#e4e4e7" stroke-width="1"/>
  <text x="754.9" y="384" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a" text-anchor="middle">1.5x</text>
  <line x1="834.4" y1="158" x2="834.4" y2="358" stroke="#e4e4e7" stroke-width="1"/>
  <text x="834.4" y="384" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a" text-anchor="middle">1.8x</text>
  <text x="595.9" y="146" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#71717a" text-anchor="middle">tuned PLD</text>
  <text x="48" y="198" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#0a0a0a">Field substitutions</text>
  <rect x="278" y="176" width="620" height="34" rx="4" fill="#f4f4f5" stroke="#d4d4d8"/>
  <rect x="278" y="176" width="405.4" height="34" rx="4" fill="#00b894"/>
  <line x1="660.2" y1="193" x2="709.8" y2="193" stroke="#008f75" stroke-width="2"/>
  <line x1="660.2" y1="186" x2="660.2" y2="200" stroke="#008f75" stroke-width="2"/>
  <line x1="709.8" y1="186" x2="709.8" y2="200" stroke="#008f75" stroke-width="2"/>
  <text x="920" y="198" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#0a0a0a">1.275x</text>
  <text x="920" y="217" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a">[1.202, 1.358]</text>
  <text x="48" y="256" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#0a0a0a">Identifier-style substitutions</text>
  <rect x="278" y="234" width="620" height="34" rx="4" fill="#f4f4f5" stroke="#d4d4d8"/>
  <rect x="278" y="234" width="521.1" height="34" rx="4" fill="#00b894"/>
  <line x1="747.0" y1="251" x2="858.3" y2="251" stroke="#008f75" stroke-width="2"/>
  <line x1="747.0" y1="244" x2="747.0" y2="258" stroke="#008f75" stroke-width="2"/>
  <line x1="858.3" y1="244" x2="858.3" y2="258" stroke="#008f75" stroke-width="2"/>
  <text x="920" y="256" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#0a0a0a">1.639x</text>
  <text x="920" y="275" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a">[1.475, 1.825]</text>
  <text x="48" y="314" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#0a0a0a">Mixed controlled suite</text>
  <rect x="278" y="292" width="620" height="34" rx="4" fill="#f4f4f5" stroke="#d4d4d8"/>
  <rect x="278" y="292" width="422.2" height="34" rx="4" fill="#00b894"/>
  <line x1="661.8" y1="309" x2="749.2" y2="309" stroke="#008f75" stroke-width="2"/>
  <line x1="661.8" y1="302" x2="661.8" y2="316" stroke="#008f75" stroke-width="2"/>
  <line x1="749.2" y1="302" x2="749.2" y2="316" stroke="#008f75" stroke-width="2"/>
  <text x="920" y="314" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#0a0a0a">1.328x</text>
  <text x="920" y="333" font-family="'SF Mono', 'Geist Mono', Consolas, Menlo, monospace" font-size="11" fill="#71717a">[1.207, 1.482]</text>
  <text x="48" y="374" font-family="Inter, Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#52525b">Intervals are paired task-bootstrap intervals from the displayed exact-path artifact.</text>
